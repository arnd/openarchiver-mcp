name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: '26'
          cache: 'npm'
      - run: npm ci
      - run: npm test
      - name: MCP smoke test (tools/list over stdio)
        run: node scripts/smoke.mjs
